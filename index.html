<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Website Pertama</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e2f;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            color: #00ffcc;
            font-size: 40px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #00ffcc;
            cursor: pointer;
        }

        button:hover {
            background-color: #00ccaa;
        }
    </style>
</head>
<body>

    <h1>HASBI VERY COOL 😎</h1>
    <p>Ini adalah website sederhana berbasis web</p>

    <button onclick="tampilPesan()">Klik Saya</button>

    <script>
        function tampilPesan() {
            alert("Halo! Hasbi memang sangat keren 🔥");
        }
    </script>

</body>
</html>
